name: Build Windows DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build x64 DLL
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download Vapoursynth SDK
        run: |
          # 从 GitHub 下载 Vapoursynth 编译好的库文件 (Header/Lib)
          # 我们只需要它的 .lib 文件来骗过编译器
          curl -L https://github.com/vapoursynth/vapoursynth/releases/download/R65/Vapoursynth64-Portable-R65.7z -o vs.7z
          7z x vs.7z -ovs_sdk
          # 将 lib 目录添加到环境变量，让 Rust 链接器能找到它
          echo "LIB=$GITHUB_WORKSPACE\vs_sdk\sdk\lib64" >> $GITHUB_ENV
          echo "VAPOURSYNTH_LIB_DIR=$GITHUB_WORKSPACE\vs_sdk\sdk\lib64" >> $GITHUB_ENV

      - name: Build Release
        run: cargo build --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vs-nlq-windows-x64
          path: target/release/vsnlq.dll
