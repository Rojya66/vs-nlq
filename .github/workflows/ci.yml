name: Build Windows DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build x64 DLL
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Vapoursynth Libs
        shell: pwsh
        run: |
          # 下载便携版
          curl -L https://github.com/vapoursynth/vapoursynth/releases/download/R65/Vapoursynth64-Portable-R65.7z -o vs.7z
          7z x vs.7z -ovs_sdk
          
          # 关键步骤：把 .lib 文件拷贝到当前目录，方便链接器直接抓取
          copy vs_sdk\sdk\lib64\vapoursynth.lib .
          copy vs_sdk\sdk\lib64\vsscript.lib .
          
          # 设置环境变量
          echo "VAPOURSYNTH_LIB_DIR=$PWD" >> $env:GITHUB_ENV
          echo "LIB=$PWD" >> $env:GITHUB_ENV

      - name: Build Release
        shell: pwsh
        run: |
          # RUSTFLAGS 指定链接路径为当前目录 (.)
          $env:RUSTFLAGS = "-L ."
          cargo build --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vs-nlq-windows-x64
          path: target/release/vsnlq.dll
