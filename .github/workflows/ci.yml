name: Build Windows DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build x64 DLL
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Vapoursynth Libs
        shell: pwsh
        run: |
          # 下载 R65 版本的 SDK
          curl -L https://github.com/vapoursynth/vapoursynth/releases/download/R65/Vapoursynth64-Portable-R65.7z -o vs.7z
          7z x vs.7z -ovs_sdk
          
          # 将 .lib 文件拷贝到项目根目录（这一步非常重要）
          copy vs_sdk\sdk\lib64\vapoursynth.lib .
          copy vs_sdk\sdk\lib64\vsscript.lib .
          
          # 打印一下当前目录文件，确保 lib 真的在那里（用于调试）
          ls *.lib

      - name: Build Release
        shell: pwsh
        run: |
          # 使用 RUSTFLAGS 显式告诉链接器：去当前目录 (.) 找库文件
          # 使用 -L native=. 强制指定本地库搜索路径
          $env:RUSTFLAGS = "-L native=."
          cargo build --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vs-nlq-windows-x64
          # 使用通配符，不管生成的是 vs_nlq.dll 还是 vs-nlq.dll 都能抓到
          path: target/release/*.dll
