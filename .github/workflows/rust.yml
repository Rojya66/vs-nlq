name: Build Windows DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build x64 DLL
    runs-on: windows-latest  # 必须是 windows
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        # 使用 cargo build --release 忽略测试和代码检查，直接出产物
        run: cargo build --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vs-nlq-windows-x64
          path: target/release/vsnlq.dll
